# Dependency ratchet for the tomato-bazel distro.
# Audits every org repo's MODULE.bazel against the canonical BOM
# (rules_tomato//bom/versions.json) and opens a per-repo PR to bump any pin that
# is BEHIND the BOM. Forward-only: repos AHEAD are reported, never downgraded.
#
# `workflow_dispatch` runs the full --write + PR flow; the same `rels deps` audit
# can also be wired as a required PR check (see conformance/README) so drift can't
# merge in the first place.
#
# Auth: the fastverk App (org secrets FASTVERK_APP_ID / FASTVERK_APP_PRIVATE_KEY).
name: dep-ratchet

on:
  schedule:
    - cron: "0 6 * * 1"      # weekly, Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ratchet:
    runs-on: ubuntu-latest
    steps:
      - name: Mint fastverk App token (org-scoped)
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.FASTVERK_APP_ID }}
          private-key: ${{ secrets.FASTVERK_APP_PRIVATE_KEY }}
          owner: tomato-bazel

      - name: Checkout bazel-registry (rels lives here)
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - name: Build rels
        run: cargo build --release --manifest-path tools/rels/Cargo.toml

      - name: Clone the BOM + every org repo (siblings, so rels finds them)
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          mkdir -p repos && cd repos
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/tomato-bazel/rules_tomato" rules_tomato
          gh repo list tomato-bazel --limit 300 --json name --jq '.[].name' | while read -r r; do
            [ "$r" = rules_tomato ] && continue
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/tomato-bazel/$r" "$r" 2>/dev/null || true
          done

      - name: Audit (always) + apply bumps
        id: ratchet
        run: |
          BOM="$PWD/repos/rules_tomato/bom/versions.json"
          # audit is the gate signal; --write applies the forward-only bumps in place.
          ./tools/rels/target/release/rels deps --bom "$BOM" || true
          ./tools/rels/target/release/rels deps --bom "$BOM" --write --no-test || true

      - name: Open a PR per bumped repo
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          BR="ratchet/bom-$(date +%Y%m%d)"
          for d in repos/*/; do
            r=$(basename "$d"); [ "$r" = rules_tomato ] && continue
            git -C "$d" diff --quiet -- MODULE.bazel && continue
            git -C "$d" config user.name  "tomato-bazel[bot]"
            git -C "$d" config user.email "tomato-bazel[bot]@users.noreply.github.com"
            git -C "$d" checkout -b "$BR"
            git -C "$d" commit -q -am "deps: ratchet MODULE.bazel pins up to the rules_tomato BOM"
            git -C "$d" push -q "https://x-access-token:${GH_TOKEN}@github.com/tomato-bazel/$r" "$BR"
            GH_TOKEN="$GH_TOKEN" gh pr create --repo "tomato-bazel/$r" --head "$BR" \
              --title "deps: ratchet to the rules_tomato BOM" \
              --body "Automated forward-only dependency bump to the canonical BOM (rules_tomato//bom/versions.json). Merges only after this repo's CI is green." || true
          done
